          - bash: echo y | sfdx plugins:install sfdx-git-delta
            displayName: Install SFDX Git Delta
          - bash: sfdx sgd:source:delta --to HEAD --from HEAD^^^ --output .
            displayName: Build Deployment package
          - bash: sfdx force:auth:jwt:grant --clientid 3MVG9Gmy2zmPB01ph7pKhLznrFjP8YImlOx_Wv5gOtM_zWkLrN8mOLCT24q4syL1Oa.Vg4uYWYDFwTyOmmmMc --jwtkeyfile ./data-setup/sit/devOps_Cert/server.key --username $(salesforceSitOrgUserName) --instanceurl https://test.salesforce.com -a sitOrg
            displayName: Authorize salesforce org
          - bash: sfdx force:source:deploy -x package/package.xml -l RunLocalTests -c -u sitOrg -w 10
            displayName: Run validation only on source code to SIT Org
          - bash: sfdx force:source:deploy -x package/package.xml -l RunLocalTests -u sitOrg -w 10
            displayName: Deploy source code to SIT Org
