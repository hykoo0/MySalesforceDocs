          - bash: sfdx force:auth:jwt:grant --clientid 3MVG9GiqKapCZBwHxZ2B4d2lrKwqjukHaBl2k2hvrQg9663NDm7knI72oGrE6b0bjPTvBVPviqOzlz32XpNQl --jwtkeyfile ./data-setup/uat/devOps_Cert/server.key --username payal.agrawal@dayross.com.uat --instanceurl https://test.salesforce.com  -a uatOrg
