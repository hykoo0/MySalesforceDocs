# Starter pipeline
# Start with a minimal pipeline that you can customize to build and deploy your code.
# Add steps that build, run tests, deploy, and more:
# https://aka.ms/yaml
pool:
  vmImage: "Ubuntu-latest"
pr:
  autoCancel: "true"
  branches:
    include:
      - dev
      - sit
      - uat
      - master
  paths:
    exclude:
      - README.md
      - azure-pipelines.yml
stages:
  - stage: DEV
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/dev'))
    jobs:
      - job: DeployDEV
        steps:
          - task: NodeTool@0
            inputs:
              versionSpec: "14.x"
              checkLatest: true
          - bash: npm install sfdx-cli --global
            displayName: Install Salesforce CLI
          - bash: sfdx config:set restDeploy=false --global
            displayName: Use SOAP API for Deployment
          - bash: echo y | sfdx plugins:install sfdx-git-delta
            displayName: Install SFDX Git Delta
          - bash: sfdx sgd:source:delta --to HEAD --from HEAD^^^ --output .
            displayName: Build Deployment package
          - bash: sfdx force:auth:jwt:grant --clientid $(salesforceDevOrgClientId) --jwtkeyfile ./data-setup/dev/devOps_Cert/server.key --username $(salesforceDevOrgUserName) --instanceurl https://test.salesforce.com -a devOrg
            displayName: Authorize salesforce org
          - bash: sfdx force:source:deploy -x package/package.xml -l RunLocalTests -c -u devOrg -w 10
            displayName: Run validation only on source code to DEV Org
          - bash: sfdx force:source:deploy -x package/package.xml -l RunLocalTests -u devOrg -w 10
            displayName: Deploy source code to DEV Org
  - stage: SIT
    dependsOn: []
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/sit'))
    jobs:
      - job: DeploySIT
